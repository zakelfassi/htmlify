name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    # Publishes via npm trusted publishing (OIDC) — no token secret involved.
    # workflow_dispatch allows re-publishing the current tagged version manually.
    if: needs.release-please.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # No registry-url here: setup-node would write a token-based .npmrc
          # whose placeholder NODE_AUTH_TOKEN preempts OIDC trusted publishing.
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
        # Node 22 bundles npm 10, which predates OIDC trusted publishing (needs npm >= 11.5.1).
      - run: npm install -g npm@latest
      - run: pnpm publish --access public --no-git-checks --provenance
