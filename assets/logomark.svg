<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="htmlify logomark: a plate title block with crop marks and one signal cell">
  <!-- crop marks -->
  <g stroke="#6E6759" stroke-width="2" opacity="0.55">
    <path d="M2 10 V2 H10" fill="none"/>
    <path d="M54 2 H62 V10" fill="none"/>
    <path d="M62 54 V62 H54" fill="none"/>
    <path d="M10 62 H2 V54" fill="none"/>
  </g>
  <!-- plate -->
  <rect x="12" y="12" width="40" height="40" fill="#FAF7F0" stroke="#1C1A15" stroke-width="3"/>
  <!-- internal hairlines -->
  <line x1="12" y1="27" x2="52" y2="27" stroke="#1C1A15" stroke-width="1.5"/>
  <line x1="32" y1="27" x2="32" y2="52" stroke="#1C1A15" stroke-width="1.5"/>
  <!-- signal cell -->
  <rect x="13.5" y="13.5" width="13" height="12" fill="#E84B0F"/>
  <!-- text rows suggested as ink bars -->
  <rect x="31" y="17" width="17" height="2.5" fill="#1C1A15"/>
  <rect x="31" y="21.5" width="11" height="2.5" fill="#6E6759"/>
  <rect x="17" y="33" width="11" height="2.5" fill="#6E6759"/>
  <rect x="17" y="38" width="9" height="2.5" fill="#6E6759"/>
  <rect x="37" y="33" width="11" height="2.5" fill="#1C1A15"/>
  <rect x="37" y="38" width="7" height="2.5" fill="#6E6759"/>
  <rect x="17" y="44" width="28" height="2.5" fill="#1C1A15"/>
</svg>
