<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-label="A terminal answer becomes a designed, self-contained HTML document">
  <defs>
    <style>
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .body { font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>
  <rect width="960" height="420" fill="#FAF7F0"/>
  <!-- crop marks -->
  <g stroke="#6E6759" stroke-width="1.5" opacity="0.6" fill="none">
    <path d="M12 26 V12 H26"/>
    <path d="M934 12 H948 V26"/>
    <path d="M948 394 V408 H934"/>
    <path d="M26 408 H12 V394"/>
  </g>

  <!-- LEFT: carbon terminal well -->
  <rect x="48" y="78" width="360" height="264" rx="2" fill="#211E18"/>
  <rect x="48" y="78" width="360" height="30" rx="2" fill="#161410"/>
  <text x="64" y="98" class="mono" font-size="11" letter-spacing="1.5" fill="#A39A88">AGENT · STDOUT</text>
  <g class="mono" font-size="12.5" fill="#E8E2D4">
    <text x="64" y="136">$ summarize the release state</text>
    <text x="64" y="162" fill="#A39A88">## Release readiness — v2.4</text>
    <text x="64" y="184" fill="#A39A88">The deploy pipeline completed all</text>
    <text x="64" y="202" fill="#A39A88">checks. Three PRs merged since the</text>
    <text x="64" y="220" fill="#A39A88">last tag. Two risks remain open…</text>
    <text x="64" y="242" fill="#A39A88">| check | state | owner |</text>
    <text x="64" y="260" fill="#A39A88">|-------|-------|-------|</text>
    <text x="64" y="278" fill="#A39A88">…another 240 lines of markdown…</text>
    <text x="64" y="316" fill="#E8E2D4">$ <tspan fill="#FF6B2C">/htmlify</tspan><tspan fill="#E8E2D4"> ▮</tspan></text>
  </g>

  <!-- ARROW -->
  <g stroke="#E84B0F" stroke-width="3" fill="none">
    <path d="M428 210 H496"/>
    <path d="M486 198 L500 210 L486 222"/>
  </g>

  <!-- RIGHT: plate document -->
  <rect x="520" y="56" width="392" height="308" fill="#FFFFFF" stroke="#1C1A15" stroke-width="2.5"/>
  <!-- plate title block -->
  <line x1="520" y1="116" x2="912" y2="116" stroke="#1C1A15" stroke-width="2"/>
  <rect x="522" y="58" width="92" height="56" fill="#E84B0F"/>
  <text x="568" y="82" class="mono" font-size="10" letter-spacing="1.2" fill="#FFFFFF" text-anchor="middle">MODE</text>
  <text x="568" y="100" class="mono" font-size="11" letter-spacing="0.8" fill="#FFFFFF" text-anchor="middle">RELEASE</text>
  <line x1="614" y1="58" x2="614" y2="114" stroke="#1C1A15" stroke-width="1"/>
  <text x="630" y="84" class="serif" font-size="22" fill="#1C1A15">Release readiness — v2.4</text>
  <text x="630" y="104" class="mono" font-size="10" letter-spacing="1" fill="#6E6759">2026-06-11 · REPO@MAIN · ONE FILE</text>
  <!-- scoreboard cells -->
  <g>
    <rect x="544" y="138" width="108" height="56" fill="none" stroke="#D9D2C3" stroke-width="1"/>
    <rect x="652" y="138" width="108" height="56" fill="none" stroke="#D9D2C3" stroke-width="1"/>
    <rect x="760" y="138" width="108" height="56" fill="none" stroke="#D9D2C3" stroke-width="1"/>
    <text x="556" y="156" class="mono" font-size="9.5" letter-spacing="1.2" fill="#6E6759">CHECKS</text>
    <text x="556" y="182" class="serif" font-size="22" fill="#2C7A52">14 / 14</text>
    <text x="664" y="156" class="mono" font-size="9.5" letter-spacing="1.2" fill="#6E6759">PRS MERGED</text>
    <text x="664" y="182" class="serif" font-size="22" fill="#1C1A15">3</text>
    <text x="772" y="156" class="mono" font-size="9.5" letter-spacing="1.2" fill="#6E6759">OPEN RISKS</text>
    <text x="772" y="182" class="serif" font-size="22" fill="#B5341B">2</text>
  </g>
  <!-- timeline + stamps -->
  <g>
    <line x1="544" y1="214" x2="868" y2="214" stroke="#1C1A15" stroke-width="2"/>
    <text x="544" y="232" class="mono" font-size="9.5" letter-spacing="1.2" fill="#6E6759">2.0 · TIMELINE</text>
    <g class="body" font-size="12" fill="#1C1A15">
      <circle cx="550" cy="252" r="3" fill="#E84B0F"/>
      <text x="562" y="256">Deploy pipeline green on main</text>
      <circle cx="550" cy="276" r="3" fill="#1C1A15"/>
      <text x="562" y="280">Auth migration behind flag</text>
      <circle cx="550" cy="300" r="3" fill="#1C1A15"/>
      <text x="562" y="304">Rollback drill validated</text>
    </g>
    <rect x="756" y="240" width="112" height="26" rx="2" fill="none" stroke="#2C7A52" stroke-width="1.5"/>
    <text x="812" y="257" class="mono" font-size="11" letter-spacing="1.5" fill="#2C7A52" text-anchor="middle">SHIP READY</text>
    <rect x="726" y="276" width="142" height="26" rx="2" fill="none" stroke="#A87514" stroke-width="1.5"/>
    <text x="797" y="293" class="mono" font-size="11" letter-spacing="1.2" fill="#A87514" text-anchor="middle">2 RISKS OPEN</text>
  </g>
  <!-- plate footer -->
  <line x1="520" y1="336" x2="912" y2="336" stroke="#1C1A15" stroke-width="1"/>
  <text x="536" y="354" class="mono" font-size="9.5" letter-spacing="1.2" fill="#6E6759">ONE FILE · INLINE CSS+JS · PRINTS TO PDF · OPENS ANYWHERE</text>

  <!-- caption -->
  <text x="48" y="386" class="mono" font-size="11" letter-spacing="1.5" fill="#6E6759">STDOUT, MADE PERMANENT</text>
</svg>
