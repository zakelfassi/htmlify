  </g>
  <text x="524" y="216" class="mono" font-size="10" letter-spacing="1.2" fill="#6E6759">6 DECK MODES · KEYBOARD NAV · 40–60% VISUAL</text>

  <!-- shared core -->
  <g stroke="#1C1A15" stroke-width="1.5" fill="none">
    <path d="M256 248 V276"/>
    <path d="M704 248 V276"/>
  </g>
  <rect x="146" y="276" width="668" height="48" rx="2" fill="#211E18"/>
  <text x="480" y="296" class="mono" font-size="11" letter-spacing="1.5" fill="#E8E2D4" text-anchor="middle">SHARED CORE · htmlify-answer --validate · RICH / APP / DECK PROFILES</text>
  <text x="480" y="313" class="mono" font-size="10" letter-spacing="1.2" fill="#A39A88" text-anchor="middle">ZERO DEPENDENCIES · ZERO BUILD · ONE SELF-CONTAINED FILE</text>
